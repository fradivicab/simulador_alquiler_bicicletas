<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiciGuata - Alquiler de Bicicletas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <script src="js/app.js" defer></script>
</head>

<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">BiciGuata</h1>
        </div>
    </nav>

    <header class="relative h-[50vh] flex items-center justify-center text-white">
        <img src="assets/img/bici-index-init.webp" alt="Hero Bike"
            class="absolute inset-0 w-full h-full object-cover object-center brightness-50">
        <div class="relative text-center px-4">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-2">BiciGuata</h2>
            <p class="text-lg">Explora la ciudad sobre ruedas por <span class="font-bold text-indigo-300">$2000/h</span>
            </p>
        </div>
    </header>

    <main class="container mx-auto py-12 px-4">


        <section id="catalogo" class="mb-16">
            <h3 class="text-3xl font-bold text-gray-900 mb-8">Nuestras Bicicletas</h3>
            <div id="contenedor-bicicletas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <section id="alquiler"
            class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-100 mb-12">
            <h3 class="text-2xl font-bold mb-6 text-center text-gray-800">Nueva Reserva</h3>
            <form id="form-alquiler" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Nombre del Cliente</label>
                    <input type="text" id="cliente"
                        class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
                        required>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Ciudad</label>
                        <select id="ciudad"
                            class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
                            required>
                            <option value="">-- Seleccionar --</option>
                            <option value="Asunción">Asunción</option>
                            <option value="San Lorenzo">San Lorenzo</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Número de Contacto</label>
                        <input type="text" id="telefono" maxlength="10" placeholder="09xxxxxxxx"
                            class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
                            required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Seleccionar Bicicleta</label>
                    <select id="select-bicicleta"
                        class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
                        required>
                        <option value="">-- Seleccionar --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Cantidad de Horas Estimadas</label>
                    <input type="number" id="horas" min="1"
                        class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
                        required>
                </div>
                <button type="submit"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">
                    Calcular Presupuesto
                </button>
            </form>
            <div id="resumen-alquiler"
                class="mt-6 hidden p-4 bg-indigo-50 border border-indigo-100 rounded-lg text-indigo-900"></div>
            <div id="acciones-confirmacion" class="hidden flex gap-3 mt-4">
                <button id="btn-confirmar"
                    class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">
                    Confirmar Alquiler
                </button>
                <button id="btn-cancelar" type="button"
                    class="flex-1 bg-gray-400 text-white py-3 rounded-lg font-bold hover:bg-gray-500 transition">
                    Cancelar
                </button>
            </div>
            <div id="msj-estado" class="hidden mt-4 p-3 rounded-lg text-center font-medium transition-all duration-500"></div>
        </section>

        <section id="devolucion" class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h3 class="text-2xl font-bold mb-6 text-center text-gray-800">Devolución y Cobro</h3>
            <form id="form-devolucion" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Seleccionar Bici Alquilada</label>
                    <select id="select-devolucion"
                        class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-red-400 outline-none" required>
                        <option value="">-- Seleccionar --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Horas Reales de Uso</label>
                    <input type="number" id="horas-devolucion" min="1"
                        class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-red-400 outline-none" required>
                </div>
                <button type="submit"
                    class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition">
                    Procesar Devolución
                </button>
            </form>
            <div id="resultado-devolucion"
                class="mt-4 hidden p-4 bg-green-50 border border-green-200 rounded-lg text-green-800 text-center font-semibold">
            </div>
        </section>
        <section
            class="mb-12 bg-white p-6 rounded-xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h4 class="text-lg font-bold text-gray-700">Resumen de Alquileres</h4>
                <p class="text-gray-500 text-sm">Cálculo histórico de ingresos.</p>
            </div>
            <div class="text-right">
                <p id="total-ingresos" class="text-3xl font-black text-indigo-600">$0</p>
                <button id="btn-limpiar-storage" class="text-xs text-red-500 underline hover:text-red-700">
                    Reiniciar registros
                </button>
            </div>
        </section>

    </main>

    <footer class="bg-gray-900 text-gray-500 py-10 text-center">
        <p>&copy; 2026 BiciGuata Simulator | Francisco DDV</p>
    </footer>

</body>

</html>
